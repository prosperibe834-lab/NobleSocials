<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NobleSocials | Admin Login</title>
    <link rel="stylesheet" href="./css/login.css    ">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="dark"> <!-- Defaulting to dark to match your dashboard style -->
    
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-icon">
                    <i class='bx bxs-shield-quarter'></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Enter your credentials to access NobleSocials Admin</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class='bx bx-envelope'></i>
                        <input type="email" id="email" placeholder="admin@noblesocials.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <i class='bx bx-hide toggle-password' onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="login-utils">
                    <label class="checkbox-container">
                        <input type="checkbox" checked>
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Sign In</span>
                    <i class='bx bx-right-arrow-alt'></i>
                </button>
            </form>

            <div class="login-footer">
                <p>Not an admin? <a href="#">Request Access</a></p>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="./js/login.js"></script>
</body>
</html>
