<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NobleSocials | Reset Password</title>
    <link rel="stylesheet" href="./css/forgot-password.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body class="dark">
    
    <div class="login-container">
        <!-- STEP 1: Email Request -->
        <div class="login-box" id="step-email">
            <div class="login-header">
                <div class="logo-icon"><i class='bx bx-key'></i></div>
                <h1>Forgot Password?</h1>
                <p>Enter your email to receive a reset OTP.</p>
            </div>
            <form onsubmit="handleSendOTP(event)">
                <div class="input-group">
                    <label>Admin Email</label>
                    <div class="input-wrapper">
                        <i class='bx bx-envelope'></i>
                        <input type="email" id="resetEmail" placeholder="admin@noblesocials.com" required>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="sendOtpBtn">
                    <span>Send OTP</span>
                    <i class='bx bx-paper-plane'></i>
                </button>
            </form>
            <div class="login-footer">
                <a href="login.html" class="forgot-link"><i class='bx bx-arrow-back'></i> Back to Login</a>
            </div>
        </div>

        <!-- STEP 2: OTP Verification -->
        <div class="login-box" id="step-otp" style="display: none;">
            <div class="login-header">
                <div class="logo-icon" style="background: var(--accent-warning);"><i class='bx bx-shield-quarter'></i></div>
                <h1>Verify Identity</h1>
                <p>Enter the 4-digit code sent to your email.</p>
            </div>
            <form onsubmit="handleVerifyOTP(event)">
                <div class="otp-input-wrapper" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 30px;">
                    <input type="text" maxlength="1" class="otp-field" onkeyup="moveFocus(this, 'otp2')" id="otp1">
                    <input type="text" maxlength="1" id="otp2" class="otp-field" onkeyup="moveFocus(this, 'otp3')">
                    <input type="text" maxlength="1" id="otp3" class="otp-field" onkeyup="moveFocus(this, 'otp4')">
                    <input type="text" maxlength="1" id="otp4" class="otp-field">
                </div>
                <button type="submit" class="login-btn">
                    <span>Verify Code</span>
                    <i class='bx bx-badge-check'></i>
                </button>
            </form>
            <div class="login-footer">
                <p>Didn't get the code? <a href="#" class="forgot-link" onclick="showToast('New code sent!')">Resend Code</a></p>
            </div>
        </div>

        <!-- STEP 3: New Password Creation -->
        <div class="login-box" id="step-new-password" style="display: none;">
            <div class="login-header">
                <div class="logo-icon" style="background: var(--accent-success);"><i class='bx bx-lock-open-alt'></i></div>
                <h1>Set New Password</h1>
                <p>Create a strong password for your account.</p>
            </div>
            <form onsubmit="handleFinalReset(event)">
                <div class="input-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="newPass" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <i class='bx bx-check-double'></i>
                        <input type="password" id="confirmPass" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    <span>Update Password</span>
                    <i class='bx bx-save'></i>
                </button>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="./js/forgot-password.js"></script>
</body>
</html>
